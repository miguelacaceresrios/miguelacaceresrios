<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2c2c2c"/>
    </linearGradient>
    <linearGradient id="mostaza" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7d681f"/>
      <stop offset="35%" stop-color="#be9e44"/>
      <stop offset="65%" stop-color="#be9e44"/>
      <stop offset="100%" stop-color="#7d681f"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#5a2e0e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="320" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="318" fill="none" stroke="url(#mostaza)" stroke-width="2"/>
  <rect x="8" y="8" width="784" height="304" fill="none" stroke="#be9e44" stroke-width="0.8" opacity="0.4"/>

  <!-- Esquinas -->
  <line x1="8" y1="8" x2="44" y2="8" stroke="#be9e44" stroke-width="1.5"/>
  <line x1="8" y1="8" x2="8" y2="44" stroke="#be9e44" stroke-width="1.5"/>
  <circle cx="8" cy="8" r="3" fill="#be9e44"/>
  <line x1="792" y1="8" x2="756" y2="8" stroke="#be9e44" stroke-width="1.5"/>
  <line x1="792" y1="8" x2="792" y2="44" stroke="#be9e44" stroke-width="1.5"/>
  <circle cx="792" cy="8" r="3" fill="#be9e44"/>
  <line x1="8" y1="312" x2="44" y2="312" stroke="#be9e44" stroke-width="1.5"/>
  <line x1="8" y1="312" x2="8" y2="276" stroke="#be9e44" stroke-width="1.5"/>
  <circle cx="8" cy="312" r="3" fill="#be9e44"/>
  <line x1="792" y1="312" x2="756" y2="312" stroke="#be9e44" stroke-width="1.5"/>
  <line x1="792" y1="312" x2="792" y2="276" stroke="#be9e44" stroke-width="1.5"/>
  <circle cx="792" cy="312" r="3" fill="#be9e44"/>

  <!-- Kanji fantasma -->
  <text x="400" y="270" fill="#be9e44" font-size="240" opacity="0.04" text-anchor="middle" font-family="serif">武</text>

  <!-- Sello -->
  <rect x="24" y="24" width="64" height="64" rx="3" fill="url(#btn)" stroke="#be9e44" stroke-width="1.2"/>
  <text x="56" y="68" fill="#be9e44" font-size="34" text-anchor="middle" font-family="serif">武</text>

  <!-- Online (sin miembros) -->
  <circle cx="680" cy="40" r="4" fill="#2e8b57"/>
  <text x="695" y="45" fill="#be9e44" font-size="12">online</text>

  <!-- Título -->
  <text x="400" y="118" fill="#be9e44" font-size="40" font-weight="bold" letter-spacing="4" text-anchor="middle">36 Code Chambers</text>

  <!-- Divisor -->
  <line x1="40" y1="136" x2="310" y2="136" stroke="#7d681f" stroke-width="1"/>
  <text x="400" y="154" fill="#9c8344" font-size="12" letter-spacing="5" text-anchor="middle">ENTRA · APRENDE · SUPERA · 入</text>
  <line x1="490" y1="136" x2="760" y2="136" stroke="#7d681f" stroke-width="1"/>

  <!-- Descripción -->
  <text x="400" y="194" fill="#c0a86a" font-size="16" text-anchor="middle">Comunidad donde cada lenguaje es una cámara.</text>
  <text x="400" y="218" fill="#c0a86a" font-size="16" text-anchor="middle">Aprende, compite y domínalos todos.</text>

  <!-- Línea -->
  <line x1="24" y1="244" x2="776" y2="244" stroke="#7d681f" stroke-width="0.8" opacity="0.6"/>

  <!-- Botón -->
  <rect x="300" y="266" width="200" height="30" rx="4" fill="url(#btn)" stroke="#be9e44" stroke-width="1"/>
  <text x="400" y="286" fill="#be9e44" font-size="14" font-weight="bold" text-anchor="middle">Unirse al servidor</text>
</svg>