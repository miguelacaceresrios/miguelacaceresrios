      <stop offset="0%" stop-color="#7d681f"/>
      <stop offset="50%" stop-color="#be9e44"/>
      <stop offset="100%" stop-color="#7d681f"/>
    </linearGradient>
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="600" height="100" fill="#1a1a1a" rx="10" ry="10" filter="url(#sombra)"/>
  <rect x="2" y="2" width="596" height="96" fill="none" stroke="url(#bgTitle)" stroke-width="2" rx="8" ry="8"/>
  
  <!-- Dragón chino de fondo (sin caracteres) -->
