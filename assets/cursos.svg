    <path d="M520 45 L 540 35 L 535 55 L 555 45" stroke="#be9e44" fill="none" opacity="0.3"/>
  </g>
  
  <!-- Título principal -->
  <text x="300" y="60" fill="#be9e44" font-size="32" font-weight="bold" text-anchor="middle" letter-spacing="2">˗ˏˋ ★ ˎˊ˗ CURSOS ˏˋ ★ ˎˊ˗</text>
  
