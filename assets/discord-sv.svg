<svg width="800" height="230" viewBox="0 0 800 230" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0800"/>
      <stop offset="100%" style="stop-color:#130f02"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#6b4f10"/>
      <stop offset="35%"  style="stop-color:#d4a830"/>
      <stop offset="65%"  style="stop-color:#d4a830"/>
      <stop offset="100%" style="stop-color:#6b4f10"/>
    </linearGradient>
    <linearGradient id="redbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7a1a08"/>
      <stop offset="100%" style="stop-color:#4a0e04"/>
    </linearGradient>
  </defs>

  <rect width="800" height="230" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="228" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <rect x="8" y="8" width="784" height="214" fill="none" stroke="#6b4f10" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Corner ornaments -->
  <line x1="8" y1="8" x2="44" y2="8" stroke="#d4a830" stroke-width="1.5"/>
  <line x1="8" y1="8" x2="8" y2="44" stroke="#d4a830" stroke-width="1.5"/>
  <circle cx="8" cy="8" r="3" fill="#d4a830"/>
  <line x1="792" y1="8" x2="756" y2="8" stroke="#d4a830" stroke-width="1.5"/>
  <line x1="792" y1="8" x2="792" y2="44" stroke="#d4a830" stroke-width="1.5"/>
  <circle cx="792" cy="8" r="3" fill="#d4a830"/>
  <line x1="8" y1="222" x2="44" y2="222" stroke="#d4a830" stroke-width="1.5"/>
  <line x1="8" y1="222" x2="8" y2="186" stroke="#d4a830" stroke-width="1.5"/>
  <circle cx="8" cy="222" r="3" fill="#d4a830"/>
  <line x1="792" y1="222" x2="756" y2="222" stroke="#d4a830" stroke-width="1.5"/>
  <line x1="792" y1="222" x2="792" y2="186" stroke="#d4a830" stroke-width="1.5"/>
  <circle cx="792" cy="222" r="3" fill="#d4a830"/>

  <!-- Ghost kanji -->
  <text x="570" y="210" fill="#d4a830" font-size="190" font-weight="bold" opacity="0.04" font-family="serif">武</text>

  <!-- Red seal -->
  <rect x="22" y="26" width="64" height="64" rx="3" fill="url(#redbg)" stroke="#d4a830" stroke-width="1.2"/>
  <text x="54" y="70" fill="#d4a830" font-size="34" font-weight="bold" text-anchor="middle" font-family="serif">武</text>

  <!-- Title -->
  <text x="104" y="58" fill="#d4a830" font-size="26" font-weight="bold" letter-spacing="2">36 Code Chambers</text>

  <!-- Subtitle -->
  <line x1="104" y1="72" x2="560" y2="72" stroke="#6b4f10" stroke-width="0.8"/>
  <text x="104" y="92" fill="#a07828" font-size="12" letter-spacing="4" font-family="'Segoe UI', sans-serif">ENTRA · APRENDE · SUPERA · 入</text>

  <!-- Description line 1 -->
  <text x="104" y="122" fill="#c8a860" font-size="15" font-family="'Segoe UI', sans-serif">Comunidad donde cada lenguaje es una cámara.</text>

  <!-- Description line 2 -->
  <text x="104" y="146" fill="#c8a860" font-size="15" font-family="'Segoe UI', sans-serif">Aprende, compite y domínalos todos.</text>

  <!-- Divider -->
  <line x1="22" y1="168" x2="778" y2="168" stroke="#6b4f10" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- Status -->
  <circle cx="22" cy="192" r="5" fill="#22c55e"/>
  <text x="36" y="197" fill="#7a6030" font-size="13" font-family="'Segoe UI', sans-serif">Online</text>
  <text x="84" y="197" fill="#4a3818" font-size="13" font-family="'Segoe UI', sans-serif"> · discord.gg/Da6mtxDGdJ</text>

  <!-- Button -->
  <rect x="572" y="178" width="206" height="36" rx="3" fill="url(#redbg)" stroke="#d4a830" stroke-width="1.2"/>
  <text x="675" y="200" fill="#d4a830" font-size="14" font-weight="bold" text-anchor="middle" font-family="'Segoe UI', sans-serif">Unirse al servidor →</text>
</svg>
