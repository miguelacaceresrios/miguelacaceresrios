<svg width="600" height="100" viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', 'Times New Roman', serif">
  <defs>
    <linearGradient id="bgTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7d681f"/>
      <stop offset="50%" stop-color="#be9e44"/>
      <stop offset="100%" stop-color="#7d681f"/>
    </linearGradient>
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="600" height="100" fill="#1a1a1a" rx="10" ry="10" filter="url(#sombra)"/>
  <rect x="2" y="2" width="596" height="96" fill="none" stroke="url(#bgTitle)" stroke-width="2" rx="8" ry="8"/>
  
  <!-- Dragón con curva juguetona y estrellas (sin caracteres) -->
  <g opacity="0.15" fill="none" stroke="#be9e44" stroke-width="2">
    <path d="M80 50 Q 130 30, 180 60 T 260 40 T 340 70 T 420 50 T 500 60" stroke-linecap="round"/>
    <circle cx="70" cy="45" r="6" fill="#be9e44" opacity="0.3"/>
    <circle cx="530" cy="55" r="5" fill="#be9e44" opacity="0.3"/>
    <circle cx="550" cy="40" r="4" fill="#be9e44" opacity="0.3"/>
  </g>
  
  <!-- Título principal -->
  <text x="300" y="60" fill="#be9e44" font-size="32" font-weight="bold" text-anchor="middle" letter-spacing="2">Fan Games (❍ᴥ❍ʋ)</text>
  
  <!-- Línea decorativa inferior -->
  <line x1="150" y1="80" x2="450" y2="80" stroke="#be9e44" stroke-width="1.5" opacity="0.6"/>
</svg>