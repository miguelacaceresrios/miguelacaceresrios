<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#090c12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a8e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="6" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="198" rx="6" fill="none" stroke="#1e3a5f" stroke-width="1.2"/>
  <rect x="0" y="0" width="4" height="200" rx="3" fill="url(#accent)"/>

  <rect x="20" y="18" width="34" height="22" rx="3" fill="#1e3a5f"/>
  <text x="37" y="33" fill="#7db3e8" font-size="12" font-weight="bold" text-anchor="middle">02</text>

  <text x="66" y="36" fill="#e8f0f8" font-size="22" font-weight="600">Aimai</text>

  <!-- Match badge -->
  <rect x="158" y="20" width="94" height="20" rx="10" fill="#1e3a5f" fill-opacity="0.6" stroke="#2d5a8e" stroke-width="0.8"/>
  <text x="205" y="33" fill="#7db3e8" font-size="11" text-anchor="middle">app de planes</text>

  <line x1="20" y1="50" x2="780" y2="50" stroke="#1e3a5f" stroke-width="1"/>

  <text x="20" y="76" fill="#8ba8c8" font-size="14">Conecta personas con planes cercanos mediante un sistema de match por perímetro.</text>
  <text x="20" y="98" fill="#8ba8c8" font-size="14">Descubre, crea y únete a planes en tu zona · Matching geolocalizado · Tiempo real.</text>

  <!-- Stack: fast, scalable -->
  <rect x="20"  y="116" width="56"  height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="48"  y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">Go</text>

  <rect x="84"  y="116" width="80"  height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="124" y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">PostgreSQL</text>

  <rect x="172" y="116" width="66"  height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="205" y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">Redis</text>

  <rect x="246" y="116" width="110" height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="301" y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">React Native</text>

  <rect x="364" y="116" width="76"  height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="402" y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">PostGIS</text>

  <rect x="448" y="116" width="78"  height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="487" y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">WebSocket</text>

  <line x1="20" y1="154" x2="780" y2="154" stroke="#1e3a5f" stroke-width="1"/>

  <rect x="20" y="164" width="170" height="28" rx="4" fill="#1e3a5f"/>
  <text x="105" y="182" fill="#e8f0f8" font-size="13" font-weight="600" text-anchor="middle">Ver Repositorio →</text>
</svg>
