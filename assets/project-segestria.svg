<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#090c12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a8e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="6" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="198" rx="6" fill="none" stroke="#1e3a5f" stroke-width="1.2"/>
  <rect x="0" y="0" width="4" height="200" rx="3" fill="url(#accent)"/>

  <!-- Number -->
  <rect x="20" y="18" width="34" height="22" rx="3" fill="#1e3a5f"/>
  <text x="37" y="33" fill="#7db3e8" font-size="12" font-weight="bold" text-anchor="middle">01</text>

  <!-- Title -->
  <text x="66" y="36" fill="#e8f0f8" font-size="22" font-weight="600">Segestria</text>

  <!-- Divider -->
  <line x1="20" y1="50" x2="780" y2="50" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Description -->
  <text x="20" y="76" fill="#8ba8c8" font-size="14">Launcher para Minecraft no-premium. Core en Rust compartido entre escritorio y Android.</text>
  <text x="20" y="98" fill="#8ba8c8" font-size="14">Auth vía Discord OAuth2 · Updates automáticos desde CDN · Sin Electron.</text>

  <!-- Stack -->
  <rect x="20"  y="116" width="52"  height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="46"  y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">Rust</text>

  <rect x="80"  y="116" width="54"  height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="107" y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">Tauri</text>

  <rect x="142" y="116" width="60"  height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="172" y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">Kotlin</text>

  <rect x="210" y="116" width="130" height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="275" y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">Jetpack Compose</text>

  <rect x="348" y="116" width="118" height="24" rx="3" fill="#0d1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="407" y="132" fill="#7db3e8" font-size="12" font-weight="500" text-anchor="middle">Discord OAuth2</text>

  <!-- Bottom divider -->
  <line x1="20" y1="154" x2="780" y2="154" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Button -->
  <rect x="20" y="164" width="170" height="28" rx="4" fill="#1e3a5f"/>
  <text x="105" y="182" fill="#e8f0f8" font-size="13" font-weight="600" text-anchor="middle">Ver Repositorio →</text>
</svg>
