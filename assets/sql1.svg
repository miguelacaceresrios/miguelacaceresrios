<svg width="360" height="420" viewBox="0 0 360 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2c2c2c"/>
    </linearGradient>
    <linearGradient id="mostaza" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7d681f"/>
      <stop offset="50%" stop-color="#be9e44"/>
      <stop offset="100%" stop-color="#7d681f"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#5a2e0e"/>
    </linearGradient>
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="360" height="420" fill="url(#bg)"/>
  <g transform="translate(20,20)" filter="url(#sombra)">
    <rect x="0" y="0" width="320" height="380" rx="12" fill="#2a2a2a" stroke="url(#mostaza)" stroke-width="2"/>
    <text x="160" y="50" fill="#be9e44" font-size="28" font-weight="bold" text-anchor="middle">Nivel I</text>
    <text x="160" y="80" fill="#c0a86a" font-size="16" text-anchor="middle">Básico</text>
    <line x1="40" y1="100" x2="280" y2="100" stroke="#be9e44" stroke-width="1.5" opacity="0.5"/>
    <text x="40" y="130" fill="#e0d0b0" font-size="14" font-weight="bold">SQL para los que odian</text>
    <text x="40" y="150" fill="#e0d0b0" font-size="14" font-weight="bold">los tecnicismos</text>
    <text x="40" y="190" fill="#e0d0b0" font-size="13">✓ 15 horas · Sin requisitos</text>
    <text x="40" y="215" fill="#e0d0b0" font-size="13">✓ Consultas desde cero</text>
    <text x="40" y="240" fill="#e0d0b0" font-size="13">✓ SELECT, WHERE, JOIN</text>
    <text x="40" y="265" fill="#e0d0b0" font-size="13">✓ Proyectos prácticos</text>
    <text x="40" y="290" fill="#e0d0b0" font-size="13">✓ Sin jerga innecesaria</text>
    <rect x="80" y="320" width="160" height="40" rx="6" fill="url(#btn)" stroke="#be9e44" stroke-width="1.5"/>
    <text x="160" y="347" fill="#be9e44" font-size="16" font-weight="bold" text-anchor="middle" cursor="pointer">Empieza aquí →</text>
  </g>
