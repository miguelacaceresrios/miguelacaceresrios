<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="100%" height="100%">
  <defs>
    <!-- Degradado para el texto (colores del ojo de Sauron + blanco) -->
    <linearGradient id="sauronGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#ff3300;#ffaa00;#ff3300;#ffffff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ff5500">
        <animate attributeName="stop-color" values="#ff5500;#ffaa00;#ffffff;#ff5500;#ff5500" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#ff3300;#ffaa00;#ff3300;#ffffff" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Filtro de glow animado -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur">
        <animate attributeName="stdDeviation" values="3;6;3" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo negro -->
  <rect width="1000" height="200" fill="#0a0a0a"/>

  <!-- Texto centrado con degradado animado y glow -->
  <text x="500" y="115" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="url(#sauronGradient)" text-anchor="middle" letter-spacing="8" filter="url(#glow)">OJO DE SAURON</text>

  <!-- Línea inferior decorativa muy sutil (opcional) -->
  <line x1="300" y1="150" x2="700" y2="150" stroke="#222" stroke-width="1"/>
</svg>
